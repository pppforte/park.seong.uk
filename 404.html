<!DOCTYPE html>
<html lang="ko" data-theme="dark" class="no-js">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>페이지를 찾을 수 없습니다 — park.seong.uk</title>
  <meta name="description" content="요청하신 페이지를 찾을 수 없습니다." />
  <meta name="robots" content="noindex, follow" />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />

  <!-- Theme init: prevent flash -->
  <script>
    (function () {
      var stored;
      try { stored = localStorage.getItem('psu-theme'); } catch (_) {}
      var system = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', stored || system);
    })();
  </script>

  <style>
    .error-page {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-xl);
      padding-top: var(--header-height);
    }

    .error-inner {
      max-width: 480px;
    }

    .error-code {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.06em;
      color: var(--border);
      margin-bottom: var(--space-md);
      font-variant-numeric: tabular-nums;
    }

    .error-code span {
      color: var(--accent);
    }

    .error-title {
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: var(--space-md);
    }

    .error-desc {
      font-size: 0.9375rem;
      color: var(--text-muted);
      line-height: 1.75;
      margin-bottom: var(--space-xl);
    }

    .error-mono {
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      color: var(--text-subtle);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: var(--space-md);
      margin-bottom: var(--space-xl);
      text-align: left;
    }

    .error-actions {
      display: flex;
      gap: var(--space-md);
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>

<body>

  <header class="header" role="banner">
    <div class="container">
      <a href="/" class="nav-logo" aria-label="홈으로 이동">
        박<span>.</span>성욱
      </a>
      <div class="nav-right">
        <button
          id="theme-toggle"
          class="theme-toggle"
          aria-label="다크 모드로 전환"
          title="테마 전환"
        >
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="error-page" role="main">
    <div class="error-inner">
      <p class="error-code" aria-hidden="true">4<span>0</span>4</p>

      <h1 class="error-title">페이지를 찾을 수 없습니다</h1>

      <p class="error-desc">
        요청하신 페이지가 존재하지 않거나 이동되었을 수 있습니다.<br />
        URL을 다시 확인하거나, 아래 버튼으로 메인 페이지로 돌아가세요.
      </p>

      <div class="error-mono" role="complementary" aria-label="오류 세부 정보">
        <span style="color: var(--text-subtle)">$ </span>
        <span style="color: var(--accent)">GET</span>
        <span style="color: var(--text-muted)"> &mdash; 404 Not Found</span>
      </div>

      <div class="error-actions">
        <a href="/" class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          홈으로 돌아가기
        </a>
        <a href="/#contact" class="btn btn-ghost">문의하기</a>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
