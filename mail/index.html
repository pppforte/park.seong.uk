<!DOCTYPE html>
<html lang="ko" data-theme="dark" class="no-js">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>메일 — 박성욱</title>
  <meta name="description" content="park.seong.uk 개인 웹메일 클라이언트" />
  <meta name="author" content="박성욱 (Park Seonguk)" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://park.seong.uk/mail/" />

  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="mail.css" />

  <script>
    (function () {
      var stored;
      try { stored = localStorage.getItem('psu-theme'); } catch (_) {}
      var system = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', stored || system);
    })();
  </script>
</head>

<body>

  <!-- ── Header ──────────────────────────────────────────────── -->
  <header class="header" role="banner">
    <div class="container">
      <a href="/" class="nav-logo" aria-label="홈으로 이동">
        박<span>.</span>성<span>.</span>욱
      </a>

      <div class="nav-right">
        <nav class="nav-links" role="navigation" aria-label="주 내비게이션">
          <a href="/#about">소개</a>
          <a href="/#skills">기술</a>
          <a href="/#projects">프로젝트</a>
          <a href="/#experience">경력</a>
          <a href="/#contact">연락</a>
          <a href="/blog/">블로그</a>
        </nav>

        <button
          id="theme-toggle"
          class="theme-toggle"
          aria-label="다크 모드로 전환"
          title="테마 전환"
        >
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>

        <button
          id="hamburger"
          class="hamburger"
          aria-expanded="false"
          aria-controls="mobile-nav"
          aria-label="메뉴 열기"
        >
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ── Mobile Nav ───────────────────────────────────────────── -->
  <nav id="mobile-nav" class="mobile-nav" role="navigation" aria-label="모바일 내비게이션">
    <a href="/#about">소개</a>
    <a href="/#skills">기술</a>
    <a href="/#projects">프로젝트</a>
    <a href="/#experience">경력</a>
    <a href="/#contact">연락</a>
    <a href="/blog/">블로그</a>
  </nav>

  <main id="main-content">

    <!-- ── Login Section ─────────────────────────────────────────── -->
    <section id="mail-login" class="mail-login-section" aria-labelledby="mail-login-title">
      <div class="container">
        <div class="mail-login-card">
          <div class="mail-login-header">
            <div class="mail-login-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="16" x="2" y="4" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
            </div>
            <p class="section-label">Webmail</p>
            <h1 id="mail-login-title" class="section-title">메일함</h1>
            <p class="mail-login-subtitle">park.seong.uk 개인 메일함에 접근하려면 비밀번호를 입력하세요.</p>
          </div>

          <form id="mail-login-form" class="mail-login-form" novalidate>
            <div class="form-group">
              <label for="mail-password" class="form-label">비밀번호</label>
              <input
                type="password"
                id="mail-password"
                name="password"
                class="form-input"
                placeholder="비밀번호 입력"
                autocomplete="current-password"
                required
              />
            </div>
            <p id="mail-login-error" class="mail-login-error" role="alert" aria-live="polite"></p>
            <button type="submit" class="mail-login-btn" id="mail-login-submit">
              <span class="btn-text">로그인</span>
              <span class="btn-loading" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                </svg>
              </span>
            </button>
          </form>
        </div>
      </div>
    </section>

    <!-- ── Mail App ──────────────────────────────────────────────── -->
    <section id="mail-app" class="mail-app-section" aria-label="메일 클라이언트" style="display:none;">
      <div class="container">

        <!-- Toolbar -->
        <div id="mail-toolbar" class="mail-toolbar" role="toolbar" aria-label="메일 도구">
          <div class="mail-tabs" role="tablist" aria-label="메일함 탭">
            <button
              id="tab-inbox"
              class="mail-tab active"
              role="tab"
              aria-selected="true"
              aria-controls="mail-list"
              data-tab="inbox"
            >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   aria-hidden="true" width="16" height="16">
                <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
                <path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
              </svg>
              받은편지함
              <span id="inbox-count" class="mail-tab-count" aria-label="읽지 않은 메일"></span>
            </button>
            <button
              id="tab-sent"
              class="mail-tab"
              role="tab"
              aria-selected="false"
              aria-controls="mail-list"
              data-tab="sent"
            >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   aria-hidden="true" width="16" height="16">
                <path d="m22 2-7 20-4-9-9-4Z"/>
                <path d="M22 2 11 13"/>
              </svg>
              보낸편지함
            </button>
          </div>

          <div class="mail-toolbar-actions">
            <button id="mail-compose-btn" class="mail-action-btn mail-action-btn--primary" aria-label="새 메일 작성">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   aria-hidden="true" width="16" height="16">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
              <span>새 메일</span>
            </button>
            <button id="mail-refresh-btn" class="mail-action-btn" aria-label="새로고침">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   aria-hidden="true" width="16" height="16">
                <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                <path d="M21 3v5h-5"/>
                <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                <path d="M8 16H3v5"/>
              </svg>
              <span class="sr-only">새로고침</span>
            </button>
            <button id="mail-logout-btn" class="mail-action-btn mail-action-btn--ghost" aria-label="로그아웃">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   aria-hidden="true" width="16" height="16">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              <span>로그아웃</span>
            </button>
          </div>
        </div>

        <!-- Notice -->
        <p class="mail-notice" role="status" aria-live="polite">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true" width="14" height="14">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 16v-4M12 8h.01"/>
          </svg>
          최근 7일간의 메일만 표시됩니다.
        </p>

        <!-- Email List -->
        <div id="mail-list" class="mail-list" role="region" aria-label="메일 목록" aria-live="polite">
          <div class="mail-list-loading" aria-label="로딩 중">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
              <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
            </svg>
            메일을 불러오는 중...
          </div>
        </div>

        <!-- Email Detail -->
        <div id="mail-detail" class="mail-detail" role="region" aria-label="메일 상세 내용" style="display:none;">
          <div class="mail-detail-header">
            <button id="mail-back-btn" class="mail-back-btn" aria-label="목록으로 돌아가기">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   aria-hidden="true" width="16" height="16">
                <path d="m15 18-6-6 6-6"/>
              </svg>
              목록으로
            </button>
            <button id="mail-reply-btn" class="mail-action-btn mail-action-btn--primary" aria-label="답장">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   aria-hidden="true" width="16" height="16">
                <polyline points="9 17 4 12 9 7"/>
                <path d="M20 18v-2a4 4 0 0 0-4-4H4"/>
              </svg>
              답장
            </button>
            <button id="mail-forward-btn" class="mail-action-btn" aria-label="전달">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   aria-hidden="true" width="16" height="16">
                <polyline points="15 17 20 12 15 7"/>
                <path d="M4 18v-2a4 4 0 0 1 4-4h12"/>
              </svg>
              전달
            </button>
          </div>

          <article class="mail-detail-content" aria-labelledby="mail-detail-subject">
            <header class="mail-detail-meta">
              <h2 id="mail-detail-subject" class="mail-detail-subject"></h2>
              <dl class="mail-detail-info">
                <div class="mail-detail-info-row">
                  <dt>보낸사람</dt>
                  <dd id="mail-detail-from"></dd>
                </div>
                <div class="mail-detail-info-row" id="mail-detail-to-row">
                  <dt>받는사람</dt>
                  <dd id="mail-detail-to"></dd>
                </div>
                <div class="mail-detail-info-row" id="mail-detail-cc-row" style="display:none;">
                  <dt>참조</dt>
                  <dd id="mail-detail-cc"></dd>
                </div>
                <div class="mail-detail-info-row">
                  <dt>날짜</dt>
                  <dd id="mail-detail-date"></dd>
                </div>
              </dl>
            </header>
            <div class="mail-detail-body">
              <iframe
                id="mail-detail-iframe"
                class="mail-detail-iframe"
                sandbox="allow-same-origin"
                title="메일 본문"
                aria-label="메일 본문"
              ></iframe>
            </div>
          </article>
        </div>

      </div>
    </section>

    <!-- ── Compose Modal ─────────────────────────────────────────── -->
    <div
      id="mail-compose"
      class="mail-compose-overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="compose-title"
      style="display:none;"
    >
      <div class="mail-compose-modal">
        <div class="mail-compose-header">
          <h2 id="compose-title" class="mail-compose-title">새 메일 작성</h2>
          <button id="mail-compose-close" class="mail-compose-close" aria-label="작성 취소">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true" width="18" height="18">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <form id="mail-compose-form" class="mail-compose-form" novalidate>
          <div class="form-group">
            <label for="compose-to" class="form-label">받는사람 <span aria-hidden="true">*</span></label>
            <input
              type="email"
              id="compose-to"
              name="to"
              class="form-input"
              placeholder="example@email.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group">
            <label for="compose-cc" class="form-label">참조 (CC)</label>
            <input
              type="email"
              id="compose-cc"
              name="cc"
              class="form-input"
              placeholder="example@email.com (선택)"
              autocomplete="off"
            />
          </div>

          <div class="form-group">
            <label for="compose-subject" class="form-label">제목 <span aria-hidden="true">*</span></label>
            <input
              type="text"
              id="compose-subject"
              name="subject"
              class="form-input"
              placeholder="메일 제목"
              required
            />
          </div>

          <div class="form-group form-group--grow">
            <label for="compose-body" class="form-label">내용 <span aria-hidden="true">*</span></label>
            <textarea
              id="compose-body"
              name="body"
              class="form-input form-textarea"
              placeholder="메일 내용을 입력하세요..."
              rows="10"
              required
            ></textarea>
          </div>

          <p id="mail-compose-error" class="mail-login-error" role="alert" aria-live="polite"></p>

          <div class="mail-compose-actions">
            <button type="button" id="mail-compose-cancel" class="mail-action-btn mail-action-btn--ghost">
              취소
            </button>
            <button type="submit" id="mail-compose-submit" class="mail-action-btn mail-action-btn--primary">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   aria-hidden="true" width="16" height="16">
                <path d="m22 2-7 20-4-9-9-4Z"/>
                <path d="M22 2 11 13"/>
              </svg>
              <span class="btn-text">보내기</span>
              <span class="btn-loading" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                </svg>
              </span>
            </button>
          </div>
        </form>
      </div>
    </div>

  </main>

  <!-- ── Footer ────────────────────────────────────────────────── -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <p class="footer-copy">
        &copy; 2026 박성욱. All rights reserved.
      </p>
      <div class="footer-links">
        <a href="/blog/" aria-label="블로그">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
          </svg>
          Blog
        </a>
        <a href="mailto:developer@park.seong.uk" aria-label="이메일 보내기">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect width="20" height="16" x="2" y="4" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          Email
        </a>
      </div>
    </div>
  </footer>

  <script src="../script.js"></script>
  <script src="mail.js"></script>
</body>
</html>
